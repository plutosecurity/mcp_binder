<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MCP Binder</title>
    <link rel="stylesheet" href="./dashboard.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1 class="brandTitle">MCP Binder</h1>
        </div>
        <div class="headerActions">
          <a class="githubLink" href="https://github.com/plutosecurity/mcp_binder" target="_blank" rel="noreferrer" aria-label="Open MCP Binder on GitHub" title="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56v-2.02c-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18A11.1 11.1 0 0 1 12 5.45c.98 0 1.96.13 2.88.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.14v3.72c0 .31.21.67.79.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
            </svg>
          </a>
          <button id="statusBadge" class="badge statusButton" type="button" title="Highlight activity">Idle</button>
        </div>
      </header>

      <section class="layout">
        <form id="scanForm" class="form">
          <label class="field">
            <span>Target</span>
            <input id="targetInput" name="target" value="localtest.me" autocomplete="off">
          </label>

          <label class="field">
            <span>Ports</span>
            <input id="portsInput" name="ports" value="8000-9000" autocomplete="off">
          </label>

          <div class="actions">
            <button id="scanButton" type="submit">Start Scan</button>
            <button id="cancelButton" class="secondary" type="button" disabled>Cancel</button>
          </div>
        </form>

        <section class="panel" aria-labelledby="summaryTitle">
          <h2 id="summaryTitle">Summary</h2>
          <dl class="summary">
            <div>
              <dt>Scan</dt>
              <dd id="stageValue">-</dd>
            </div>
            <div>
              <dt>Scanned</dt>
              <dd id="scannedValue">-</dd>
            </div>
            <div>
              <dt>Responsive</dt>
              <dd id="responsiveValue">-</dd>
            </div>
            <div>
              <dt>MCP</dt>
              <dd id="mcpValue">-</dd>
            </div>
            <div>
              <dt>Findings</dt>
              <dd id="findingsValue">-</dd>
            </div>
            <div>
              <dt>Auth Required</dt>
              <dd id="authValue">-</dd>
            </div>
          </dl>
        </section>
      </section>

      <section class="panel rebindPanel" aria-labelledby="rebindTitle">
        <div class="panelHeader">
          <h2 id="rebindTitle">DNS Rebind Attack</h2>
          <span id="rebindStatus" class="statusText">No finding selected</span>
        </div>
        <dl class="summary rebindDeployment">
          <div>
            <dt>Dashboard</dt>
            <dd id="dashboardBaseValue">-</dd>
          </div>
          <div>
            <dt>Rebind Domain</dt>
            <dd id="labDomainValue">-</dd>
          </div>
          <div>
            <dt>VM IP</dt>
            <dd class="vmIpSecret">
              <span id="vmIpValue">hidden</span>
              <button id="toggleVmIpButton" class="secretToggle" type="button" aria-label="Reveal VM IP" title="Reveal VM IP">
                <span id="vmIpEyeIcon" class="eyeIconShell" aria-hidden="true"></span>
              </button>
            </dd>
          </div>
        </dl>
        <div class="actions">
          <button id="openDashboardButton" class="secondary" type="button">Open Dashboard</button>
          <button id="stopRebindButton" class="secondary" type="button" disabled>Stop DNS Rebind</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="findingsTitle">
        <div class="panelHeader">
          <h2 id="findingsTitle">Findings</h2>
          <div class="toolbar">
            <select id="sortSelect" aria-label="Finding sort">
              <option value="risk">Risk first</option>
              <option value="port">Port ascending</option>
            </select>
            <button id="exportButton" class="secondary" type="button" disabled>Export JSON</button>
          </div>
        </div>
        <div class="results">
          <div id="findingsList" class="findings empty">No scan results yet.</div>
          <aside id="detailPanel" class="detail empty">Select a finding to inspect raw evidence.</aside>
        </div>
      </section>

      <aside id="activityPanel" class="activityPanel idle" aria-live="polite" tabindex="-1">
        <div class="activityHeader activityDragHandle" tabindex="0" aria-label="Move activity panel. Press Escape to reset.">
          <div>
            <p class="eyebrow">Activity</p>
            <h2 id="activityTitle">Idle</h2>
          </div>
          <span id="activityState" class="statusText">ready</span>
        </div>
        <div class="activityMeter" aria-hidden="true">
          <span id="activityMeterFill"></span>
        </div>
        <p id="activityDetail" class="activityDetail">No active scan or DNS rebind attack.</p>
        <ol id="activityTimeline" class="activityTimeline"></ol>
        <span class="activityResizeHandle" aria-hidden="true"></span>
      </aside>
    </main>

    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
